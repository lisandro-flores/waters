spring:
  application:
    name: agua-potable

  datasource:
    url: jdbc:postgresql://localhost:5432/agua_potable
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # En producción: validate. En dev: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-minimo-32-chars!!}
    expiration-ms: 86400000   # 24 horas

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.lsoft.aguapotable: DEBUG
    org.springframework.security: INFO
