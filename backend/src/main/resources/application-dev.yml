# Perfil de desarrollo — se activa con: -Dspring.profiles.active=dev
# Sobreescribe los valores de application.yml

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/agua_potable
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update          # En dev: update (eliminar en producción → validate)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

server:
  port: 8081

app:
  jwt:
    secret: "dev-secret-key-para-desarrollo-local-32chars!!"
    expiration-ms: 86400000     # 24 h

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    com.lsoft.aguapotable: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
